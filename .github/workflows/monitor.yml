name: monitor

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  issues: write
  contents: read

concurrency:
  group: monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      # Verified on 2026-07-12, latest stable: v7.0.0
      - uses: actions/checkout@v7.0.0
      # Verified on 2026-07-12, latest stable: v6.4.0
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npx tsx scripts/monitor.ts
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PROBE_URL_LANDING: ${{ secrets.PROBE_URL_LANDING }}
          PROBE_URL_DASHBOARD: ${{ secrets.PROBE_URL_DASHBOARD }}
          PROBE_URL_API_STATUS: ${{ secrets.PROBE_URL_API_STATUS }}
